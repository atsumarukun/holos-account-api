openapi: "3.0.3"

info:
  title: "holos: アカウントAPI"
  version: ""

servers:
  - url: "http://localhost:8001"
    description: "localhost"
  - url: "http://account-api:8000"
    description: "docker compose service"

paths:
  /health:
    get:
      summary: "ヘルスチェック"
      tags:
        - "health"
      responses:
        204:
          $ref: "#/components/responses/no_content"
  /accounts:
    post:
      summary: "アカウント作成"
      tags:
        - "accounts"
      requestBody:
        $ref: "#/components/requestBodies/create_account"
      responses:
        201:
          $ref: "#/components/responses/create_account"
        400:
          $ref: "#/components/responses/bad_request"
        409:
          $ref: "#/components/responses/duplicate"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
    delete:
      summary: "アカウント削除"
      tags:
        - "accounts"
      security:
        - sessionAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークン"
          example: "Session token"
      requestBody:
        $ref: "#/components/requestBodies/delete_account"
      responses:
        204:
          $ref: "#/components/responses/no_content"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        500:
          $ref: "#/components/responses/internal_server_error"
  /accounts/name:
    patch:
      summary: "アカウント名更新"
      tags:
        - "accounts"
      security:
        - sessionAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークン"
          example: "Session token"
      requestBody:
        $ref: "#/components/requestBodies/update_account_name"
      responses:
        200:
          $ref: "#/components/responses/update_account_name"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        409:
          $ref: "#/components/responses/duplicate"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
  /accounts/password:
    patch:
      summary: "パスワード更新"
      tags:
        - "accounts"
      security:
        - sessionAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークン"
          example: "Session token"
      requestBody:
        $ref: "#/components/requestBodies/update_account_password"
      responses:
        200:
          $ref: "#/components/responses/update_account_password"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
  /login:
    post:
      summary: "ログイン"
      tags:
        - "session"
      requestBody:
        $ref: "#/components/requestBodies/login"
      responses:
        200:
          $ref: "#/components/responses/login"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        500:
          $ref: "#/components/responses/internal_server_error"
  /logout:
    delete:
      summary: "ログアウト"
      tags:
        - "session"
      security:
        - sessionAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークン"
          example: "Session token"
      responses:
        204:
          $ref: "#/components/responses/no_content"
        401:
          $ref: "#/components/responses/unauthenticated"
        500:
          $ref: "#/components/responses/internal_server_error"
  /authorization:
    get:
      summary: "認可"
      tags:
        - "session"
      security:
        - sessionAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークン"
          example: "Session token"
      responses:
        200:
          $ref: "#/components/responses/authorization"
        401:
          $ref: "#/components/responses/unauthenticated"
        500:
          $ref: "#/components/responses/internal_server_error"

components:
  securitySchemes:
    sessionAuth:
      type: http
      scheme: Session

  schemas:
    account:
      type: "object"
      properties:
        id:
          type: "string"
          example: "id"
          readOnly: true
        name:
          type: "string"
          example: "name"
        password:
          type: "string"
          example: "password"
          writeOnly: true
        confirm_password:
          type: "string"
          example: "password"
          writeOnly: true
      required:
        - "id"
        - "name"
        - "password"
        - "confirm_password"
    credential:
      type: "object"
      properties:
        account_name:
          type: "string"
          example: "name"
          writeOnly: true
        password:
          type: "string"
          example: "password"
          writeOnly: true
    session:
      type: "object"
      properties:
        token:
          type: "string"
          example: "token"
          readOnly: true

  requestBodies:
    create_account:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/account"
    update_account_name:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  confirm_password:
                    readOnly: true
    update_account_password:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  name:
                    readOnly: true
                  new_password:
                    type: "string"
                    example: "password"
    delete_account:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  name:
                    readOnly: true
                  confirm_password:
                    readOnly: true
    login:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/credential"

  responses:
    create_account:
      description: "Success"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  id:
                    writeOnly: true
    update_account_name:
      description: "Success"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  id:
                    writeOnly: true
    update_account_password:
      description: "Success"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/account"
              - type: "object"
                properties:
                  id:
                    writeOnly: true
    login:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/session"
    authorization:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/account"
    no_content:
      description: "Success"
    bad_request:
      description: "Bad Request"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "BAD_REQUEST"
                  message:
                    type: "string"
                    example: "bad request"
    unauthenticated:
      description: "Unauthenticated"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "UNAUTHENTICATED"
                  message:
                    type: "string"
                    example: "unauthenticated"
    duplicate:
      description: "Duplicate"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "DUPLICATE"
                  message:
                    type: "string"
                    example: "duplicate"
    invalid_input:
      description: "Invalid Input"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "INVALID_INPUT"
                  message:
                    type: "string"
                    example: "invalid input"
    internal_server_error:
      description: "Internal Server Error"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "INTERNAL_SERVER_ERROR"
                  message:
                    type: "string"
                    example: "internal server error"
